server {
    listen 18443 ssl;
    server_name localhost 192.168.2.118 _;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=300s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # nest-admin 前端静态文件
    location / {
        try_files $uri $uri/ /index.html;
    }

    # nest-admin 后端 API
    location /api/ {
        set $backend "nest-admin";
        proxy_pass http://$backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # OpenClaw WebSocket 连接 (不带 /chat 后缀)
    # Control UI JavaScript 连接到此路径
    location ~ ^/instance/([^/]+)(/__openclaw__/dashboard)$ {
        set $instance_name $1;
        
        proxy_pass http://$instance_name:18789/__openclaw__/dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenClaw 实例控制台页面和资源 - trusted-proxy 认证
    # 通过 /instance/{name}/ 访问对应实例
    location ~ ^/instance/([^/]+)(/.*)?$ {
        set $instance_name $1;
        set $instance_path $2;
        
        # 直接从 query string 提取 token 用于 header
        if ($args ~* token=([^&]+)) {
            set $token $1;
        }
        
        # 使用 Docker DNS 解析容器名 (使用变量构造 URL)
        proxy_pass http://$instance_name:18789/$instance_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Trusted-proxy 认证头
        proxy_set_header X-Forwarded-User $token;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 支持
    location /ws/ {
        set $backend "nest-admin";
        proxy_pass http://$backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
